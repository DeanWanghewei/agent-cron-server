<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Detail - Agent Cron Server</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar sidebar-container"></div>
  <main class="main">
    <a href="tasks.html" class="back-link">&larr; Back to Tasks</a>
    <div class="page-header">
      <h1 id="task-title">Loading...</h1>
      <div class="btn-group" id="task-actions"></div>
    </div>

    <div class="card" style="margin-bottom:24px;">
      <div class="card-header">Task Information</div>
      <div class="card-body">
        <div class="info-grid" id="task-info"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        Executions
        <button class="btn btn-sm" onclick="loadExecutions(1)"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg> Refresh</button>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Status</th>
                <th>Trigger</th>
                <th>Duration</th>
                <th>Exit Code</th>
                <th>Started</th>
              </tr>
            </thead>
            <tbody id="exec-table">
              <tr><td colspan="6" class="loading">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="pagination"></div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/task-detail.js"></script>
</body>
</html>
