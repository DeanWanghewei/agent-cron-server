<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Executions - Agent Cron Server</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar sidebar-container"></div>
  <main class="main">
    <div class="page-header">
      <h1>Executions</h1>
      <button class="btn" onclick="loadExecutions(1)">Refresh</button>
    </div>

    <div class="filters">
      <select id="filter-status" onchange="loadExecutions(1)">
        <option value="">All Status</option>
        <option value="success">Success</option>
        <option value="failed">Failed</option>
        <option value="timeout">Timeout</option>
        <option value="running">Running</option>
      </select>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Task</th>
                <th>Status</th>
                <th>Trigger</th>
                <th>Duration</th>
                <th>Exit Code</th>
                <th>Started</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="exec-table">
              <tr><td colspan="8" class="loading">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="pagination"></div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/executions.js"></script>
</body>
</html>
