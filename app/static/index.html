<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Agent Cron Server</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar sidebar-container"></div>
  <main class="main">
    <div class="page-header">
      <h1><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Dashboard</h1>
      <button class="btn" onclick="loadDashboard()"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg> Refresh</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon icon-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        </div>
        <div class="stat-body">
          <div class="stat-label">Total Tasks</div>
          <div class="stat-value text-primary" id="stat-total">-</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="stat-body">
          <div class="stat-label">Enabled</div>
          <div class="stat-value text-success" id="stat-enabled">-</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-warning">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        </div>
        <div class="stat-body">
          <div class="stat-label">Disabled</div>
          <div class="stat-value text-warning" id="stat-disabled">-</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-info" id="health-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div class="stat-body">
          <div class="stat-label">Service Status</div>
          <div class="stat-value" id="stat-health" style="font-size:18px;">-</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span style="display:flex;align-items:center;gap:6px;"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Recent Executions</span>
        <a href="executions.html" class="btn btn-sm"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg> View All</a>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Task</th>
                <th>Status</th>
                <th>Trigger</th>
                <th>Duration</th>
                <th>Exit Code</th>
                <th>Started</th>
              </tr>
            </thead>
            <tbody id="exec-table">
              <tr><td colspan="6" class="loading">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/index.js"></script>
</body>
</html>
