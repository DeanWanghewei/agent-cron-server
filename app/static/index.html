<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Agent Cron Server</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar sidebar-container"></div>
  <main class="main">
    <div class="page-header">
      <h1>Dashboard</h1>
      <button class="btn" onclick="loadDashboard()">Refresh</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Tasks</div>
        <div class="stat-value text-primary" id="stat-total">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Enabled</div>
        <div class="stat-value text-success" id="stat-enabled">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Disabled</div>
        <div class="stat-value text-warning" id="stat-disabled">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Service Status</div>
        <div class="stat-value" id="stat-health" style="font-size:18px;">-</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        Recent Executions
        <a href="executions.html" class="btn btn-sm">View All</a>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Task</th>
                <th>Status</th>
                <th>Trigger</th>
                <th>Duration</th>
                <th>Exit Code</th>
                <th>Started</th>
              </tr>
            </thead>
            <tbody id="exec-table">
              <tr><td colspan="6" class="loading">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/index.js"></script>
</body>
</html>
