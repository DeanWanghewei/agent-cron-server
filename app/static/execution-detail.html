<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Execution Detail - Agent Cron Server</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar sidebar-container"></div>
  <main class="main">
    <a href="executions.html" class="back-link">&larr; Back to Executions</a>
    <div class="page-header">
      <h1 id="page-title">Execution Detail</h1>
      <button class="btn" onclick="loadData()"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg> Refresh</button>
    </div>

    <div class="card" style="margin-bottom:24px;">
      <div class="card-header">Execution Information</div>
      <div class="card-body">
        <div class="info-grid" id="exec-info"></div>
      </div>
    </div>

    <div class="card" id="log-card" style="display:none;">
      <div class="card-header">Output Log</div>
      <div class="card-body">
        <div class="log-section">
          <h3>STDOUT</h3>
          <pre class="log-output stdout" id="log-stdout"></pre>
        </div>
        <div class="log-section">
          <h3>STDERR</h3>
          <pre class="log-output stderr" id="log-stderr"></pre>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/execution-detail.js"></script>
</body>
</html>
